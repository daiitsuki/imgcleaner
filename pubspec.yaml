name: duplicated_img
description: "A Duplicate Photo Cleaner app using Flutter and pHash."
publish_to: "none"
version: 1.0.5+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  image: ^4.2.0
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  ota_update: ^7.0.1
  package_info_plus: ^8.0.0
  exif: ^3.1.1
  shared_preferences: ^2.2.3
  http: ^1.2.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
